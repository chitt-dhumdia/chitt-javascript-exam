<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Home-Page</title>

    <!-- css link  -->

    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="./display_products.html">Product-Hunt</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="./add_product.html">Add_products</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" href="./display_products.html">View_products</a>
                </li>
                
                
            </ul>
           
            </div>
        </div>
    </nav>

    <div class="container mt-4">

    <div class="row mb-4">

        <div class="col-md-4">
            <select id="p_category" class="form-select">
                <option selected>Select your category</option>
                <option>Sports</option>
                <option>Electronics</option>
                <option>beauty & personal care</option>
                <option>Plants</option>
            </select>
        </div>

        <div class="col-md-4">
            <input class="form-control" id="search" type="search" placeholder="Search Product"/>
        </div>

        <div class="col-md-4">
            <select id="sort-price" class="form-select">
                <option selected>Filter by price</option>
                <option value="low">Low to High</option>
                <option value="high">High to Low</option>
            </select>
        </div>

    </div>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2>Product</h2>
            </div>
        </div>
    </div>

    <div class="row" id="product-container">

    </div>

</div>
    

    <!-- Bootstrap JavaScript -->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</body>
</html>
